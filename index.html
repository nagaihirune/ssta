<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>長居昼音 | Nagai Hirune - Official Site</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading">
        <div class="loading-icon"></div>
        <p>IMA LODING...</p>
    </div>
    
    <canvas id="particle-canvas"></canvas>
    
    <header>
        <div class="logo">NAGAI HIRUNE</div>
    </header>

    <main>
        <!-- Heroセクション -->
        <section id="hero" class="active">
            <p class="hero-catch">深夜32時、境界線を超えた夜。</p>
            
            <div class="hero-name-container">
                <!-- 横書きのルビ付き名前 -->
                <ruby class="horizontal-name">
                    長居<rt>ながい</rt> 昼音<rt>ひるね</rt>
                </ruby>
            </div>
            
            <p class="hero-sub">Nagai Hirune - Virtual YouTuber</p>
        </section>

        <!-- Profileセクション -->
        <section id="profile">
            <h2 class="section-title">PROFILE</h2>
            <div class="antique-frame">
                <div style="text-align: center;">
                    <p>眠れぬ夜を共にする、夢の案内人。<br>夜遊びと微睡みを愛し、明けない夜を泳ぎ続ける。</p>
                    <ul class="profile-list">
                        <li><span>名前</span>長居 昼音(ながい ひるね)</li>
                        <li><span>誕生日</span>2006.03.28</li>
                        <li><span>身長</span>163cm</li>
                    </ul>
                </div>
            </div>
        </section>

        <!-- Scheduleセクション -->
        <section id="schedule">
            <h2 class="section-title">SCHEDULE</h2>
            <div class="schedule-grid">
                <div class="schedule-item"><div class="day-name">月</div><div>不定期</div></div>
                <div class="schedule-item"><div class="day-name">火</div><div>休</div></div>
                <div class="schedule-item"><div class="day-name">水</div><div>休</div></div>
                <div class="schedule-item"><div class="day-name">木</div><div>不定期</div></div>
                <div class="schedule-item"><div class="day-name">金</div><div>不定期</div></div>
                <div class="schedule-item"><div class="day-name">土</div><div>不定期</div></div>
                <div class="schedule-item"><div class="day-name">日</div><div>不定期</div></div>
            </div>
        </section>

        <!-- Linksセクション -->
        <section id="links">
            <h2 class="section-title">LINKs</h2>
            <div class="links-list">
                <a href="#" class="link-item"><span>YouTube</span><span>→</span></a>
                <a href="#" class="link-item"><span>X (Twitter)</span><span>→</span></a>
                <a href="#" class="link-item"><span>Discord</span><span>→</span></a>
            </div>
        </section>
    </main>

    <footer>&copy; NAGAI HIRUNE.</footer>

    <script src="script.js"></script>
</body>
</html>
